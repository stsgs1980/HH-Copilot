version: "3.9"

services:
  bot:
    build: .
    command: python -m scripts.run_bot
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build: .
    command: python -m scripts.run_worker
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:

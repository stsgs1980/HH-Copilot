<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 300px; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; }
    .header { padding: 20px 16px 16px; text-align: center; }
    .logo { width: 40px; height: 40px; background: linear-gradient(135deg, #059669, #10B981); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; color: #fff; }
    .logo svg { width: 20px; height: 20px; }
    .title { font-size: 15px; font-weight: 700; color: #18181b; }
    .subtitle { font-size: 11px; color: #52525b; margin-top: 4px; }
    .body { padding: 0 16px 16px; }
    .hint { font-size: 12px; color: #52525B; line-height: 1.6; text-align: center; padding: 16px; background: #FAFAFA; border-radius: 10px; border: 1px solid rgba(0,0,0,0.06); }
    .hint b { color: #059669; }
    .icon { display: inline-flex; align-items: center; }
    .icon svg { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .icon-fallback { display: none; }
    .btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; text-align: center; margin-top: 12px; transition: background 0.15s; }
    .btn .icon svg { width: 16px; height: 16px; flex-shrink: 0; }
    .btn:focus-visible { outline: 2px solid #059669; outline-offset: 2px; }
    .btn-primary { background: #059669; color: #fff; }
    .btn-primary:hover { background: #047857; }
    .btn-secondary { background: #F4F4F5; color: #18181b; }
    .btn-secondary:hover { background: #E4E4E7; }
    .btn-secondary.active { background: #7c3aed; color: #fff; }
    .footer { padding: 10px 16px; text-align: center; font-size: 10px; color: #71717a; border-top: 1px solid #f4f4f5; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo" aria-hidden="true">
      <span class="icon">
        <!-- Lucide: briefcase (official SVG) -->
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
             onerror="this.style.display='none';this.nextElementSibling.style.display='inline'">
          <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
          <rect width="8" height="4" x="8" y="2" rx="1" ry="1"/>
        </svg>
        <span class="icon-fallback">HH</span>
      </span>
    </div>
    <div class="title">HH Copilot</div>
    <div class="subtitle" id="version">--</div>
  </div>
  <div class="body">
    <div class="hint">
      Панель управления доступна на страницах hh.ru через <b>зелёную кнопку FAB</b> в правом нижнем углу.
    </div>
    <button class="btn btn-secondary" id="btn-inspector" title="Включить/выключить DOM-инспектор на текущей вкладке">
      <span class="icon">
        <!-- Lucide: eye (official SVG) -->
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
             onerror="this.style.display='none';this.nextElementSibling.style.display='inline'">
          <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <span class="icon-fallback">[eye]</span>
      </span>
      <span id="btn-inspector-text">DOM-инспектор</span>
    </button>
    <a href="https://hh.ru" target="_blank" rel="noopener" class="btn btn-primary">Открыть hh.ru</a>
  </div>
  <div class="footer">HH Copilot -- автоматизация откликов</div>
  <script src="popup.js"></script>
</body>
</html>
